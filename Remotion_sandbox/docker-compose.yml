services:
  remotion-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: remotion-sandbox
    privileged: true
    cap_add:
      - ALL
    security_opt:
      - seccomp:unconfined
    shm_size: 2gb
    tty: true
    stdin_open: true
    environment:
      DISPLAY: ":1"
      REMOTION_STUDIO_PORT: "3000"
      NOVNC_PORT: "8080"
      VNC_PORT: "5900"
      REMOTION_APP_DIR: "/workspace/app"
      REMOTION_OUTPUT_DIR: "/workspace/storage/output"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
      - "8080:8080"
      - "5900:5900"
    volumes:
      - ./app:/workspace/app
      - remotion-node-modules:/workspace/app/node_modules
      - ./storage:/workspace/storage
      - ./cache/npm:/root/.npm
      - ./cache/remotion:/root/.cache/remotion

volumes:
  remotion-node-modules:
